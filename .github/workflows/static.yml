# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # === NEW STEP 1: Install Eleventy framework ===
      - name: Install Eleventy
        run: npm install @11ty/eleventy --save-dev

      # === NEW STEP 2: Compile markdown/HTML templates into the _site folder ===
      - name: Build Site
        run: npx @11ty/eleventy

      # === UPDATED STEP 3: Point the artifact uploader to your built '_site' folder ===
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Eleventy outputs everything to a folder named '_site' by default
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
