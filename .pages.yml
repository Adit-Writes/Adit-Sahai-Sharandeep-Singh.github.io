media_folder: "files"
public_folder: "/files"

# MainPage Stuff======================================================================
collections:
  - name: MainPage
    label: "Main Page"
    type: group
    items:
      - name: MainSiteHeader
        type: file
        path: _data/MainPage/PageInfo.json
        fields:
          - {name: PageTitle, type: string}
          - {name: UpTitle, type: string}
          - {name: DownTitle, type: string}
          - {name: Description, type: string}
          - {name: Pic, type: image}
          - {name: HeroTagline, type: string}
          - {name: ChooseLabel, type: string}
          - {name: CtaAdit, type: string}
          - {name: CtaSharan, type: string}
          - {name: LinksLabel, type: string}
          - {name: FooterNote, type: string}

      - name: MMentionedLinks
        type: collection
        path: _data/MainPage/MentionedLinks
        format: json
        filename: "{slug}.json"
        view:
          primary: Name
        fields:
          - {name: Name, type: string, required: true}
          - {name: Link, type: string, required: true}

# Adits Stuff======================================================================
  - name: AditPage
    label: "Adit Page"
    type: group
    items:
      - name: SiteHead
        type: file
        path: _data/Adit/PageInfo.json
        fields:
          - {name: PageTitle, type: string}
          - {name: Pic, type: image}
          - {name: Description, type: rich-text, options: {switcher: false}}

      - name: AboutAuthor
        type: file
        path: _data/Adit/AboutAuthor.json
        fields:
          - {name: Name, type: string}
          - {name: Expertise, type: string}
          - {name: Pic, type: image}
          - {name: Description, type: rich-text, options: {switcher: false}}

      - name: AMentionedLinks
        type: collection
        path: _data/Adit/MentionedLinks
        format: json
        filename: "{slug}.json"
        view:
          primary: Name
        fields:
          - {name: Name, type: string, required: true}
          - {name: Link, type: string, required: true}

      - name: Books
        path: _data/Adit/BooksData
        type: collection
        format: json
        filename: "{slug}.json"
        view:
          primary: Name
          sort: [PublishedDate, Name, Topic]
        fields:
          - {name: Name, type: string, required: true}
          - {name: PublishedDate, type: date, required: true}
          - {name: Pic, type: image}
          - {name: Topic, type: string}
          - {name: About, type: rich-text, options: {switcher: false}}
          - {name: Link, type: string}

      - name: ArticleCategories
        label: Categories
        type: collection
        path: _data/Adit/categories
        format: json
        filename: "{slug}.json"
        fields:
          - {name: name, type: string, required: true}

      - name: Articles
        path: _data/Adit/ArticlesData
        type: collection
        format: json
        filename: "{slug}.json"
        fields:
          - {name: Title, type: string, required: true}
          - {name: Topic, type: reference, collection: ArticleCategories, field: name}
          - {name: Pics, type: image, list: true}
          - {name: Files, type: file, list: true}
          - {name: Links, type: string, list: true}
          - {name: Published, type: boolean, default: false}
          - {name: Body, type: rich-text, required: true}
          - {name: ReleaseDate, type: date, required: true}

# Sharan's Stuff======================================================================
  - name: Sharan
    label: "Sharan"
    type: group
    items:
      - name: SiteHeader
        type: file
        path: _data/Sharan/SiteHeader.json
        fields:
          - {name: PageTitle, type: string}
          - {name: Pic, type: image}
          - {name: Description, type: rich-text, options: {switcher: false}}

      - name: AboutPage
        type: file
        path: _data/Sharan/AboutPage.json
        fields:
          - {name: Name, type: string}
          - {name: ShortName, type: string}
          - {name: Pic, type: image}
          - {name: Expertise, type: string}
          - {name: Description, type: rich-text, options: {switcher: false}}

      - name: SMentionedLinks
        type: collection
        path: _data/Sharan/MentionedLinks
        format: json
        filename: "{slug}.json"
        fields:
          - {name: Name, type: string, required: true}
          - {name: Link, type: string, required: true}