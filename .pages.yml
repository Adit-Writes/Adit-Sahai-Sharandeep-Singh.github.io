media:
  input: files
  output: /files

content:

  # Page Stuff======================================================================

  - name: MainPage
    type: group
    items:

      - name: MainSiteHeader
        type: file
        path: _data/MainPage/PageInfo.json
        fields:
          - name: PageTitle
            type: string

          - name: UpTitle
            type: string

          - name: DownTitle
            type: string

          - name: Description
            type: string

          - name: Pic
            type: image

          - name: HeroTagline
            type: string

          - name: ChooseLabel
            type: string

          - name: CtaAdit
            type: string

          - name: CtaSharan
            type: string

          - name: LinksLabel
            type: string

          - name: FooterNote
            type: string

      - name: MMentionedLinks
        type: collection
        path: _data/MainPage/MentionedLinks
        format: json
        filename: "{slug}.json"
        view:
          primary: Name
        fields:
          - name: Name
            type: string
            required: true

          - name: Link
            type: string
            required: true


  - name: AditPage
    type: group
    items:

      - name: SiteHead
        type: file
        path: _data/Adit/PageInfo.json
        fields:
          - name: PageTitle
            type: string

          - name: Pic
            type: image

          - name: Description
            type: rich-text
            options:
              switcher: false

      - name: AboutAuthor
        type: file
        path: _data/Adit/AboutAuthor.json
        fields:
          - name: Name
            type: string

          - name: Expertise
            type: string

          - name: Pic
            type: image

          - name: Desciption
            type: rich-text
            options:
              switcher: false

      - name: AMentionedLinks
        type: collection
        path: _data/Adit/MentionedLinks
        format: json
        filename: "{slug}.json"
        view:
          primary: Name
        fields:
          - name: Name
            type: string
            required: true

          - name: Link
            type: string
            required: true

  - name: SharanPage
    type: group
    items:

      - name: SiteHeader
        type: file
        path: _data/Sharan/SiteHeader.json
        fields:
          - name: PageTitle
            type: string

          - name: Pic
            type: image

          - name: Description
            type: rich-text
            options:
              switcher: false

      - name: AboutPage
        type: file
        path: _data/Sharan/AboutPage.json
        fields:
          - name: Name
            type: string

          - name: ShortName
            type: string

          - name: Pic
            type: image

          - name: Expertise
            type: string

          - name: Desciption
            type: rich-text
            options:
              switcher: false

      - name: SMentionedLinks
        type: collection
        path: _data/Sharan/MentionedLinks
        format: json
        filename: "{slug}.json"
        view:
          primary: Name
        fields:
          - name: Name
            type: string
            required: true

          - name: Link
            type: string
            required: true

  # Adits Content================================================================

  - name: AditContent
    type: group
    items:

      - name: Books
        path: _data/Adit/BooksData
        type: collection
        format: json
        filename: "{slug}.json"
        view:
          fields: [Name, Pic, Topic, PublishedDate, Link]
          primary: Name
          sort: [PublishedDate, Name, Topic]
          default:
            sort: PublishedDate
            order: desc
        fields:
          - name: Name
            type: string
            required: true

          - name: PublishedDate
            type: date
            required: true

          - name: Pic
            type: image

          - name: Topic
            type: string

          - name: About
            type: rich-text
            options:
              switcher: false

          - name: Link
            type: string

      - name: ArticleCategories
        label: Categories
        type: collection
        path: _data/Adit/categories
        format: json
        filename: "{slug}.json"
        view:
          primary: name
        fields:
          - name: name
            type: string
            required: true

      - name: Articles
        path: _data/Adit/ArticlesData
        type: collection
        format: json
        filename: "{slug}.json" # Changed to slug for cleaner URLs in your 11ty build
        view:
          fields: [Title, Topic, Published, ReleaseDate, LastUpdated]
          primary: Title
          sort: [ReleaseDate, Title]
          default:
            sort: ReleaseDate
            order: desc
        fields:
          - name: Title
            type: string
            required: true

          - name: Topic
            type: reference
            required: true
            options:
              collection: ArticleCategories
              field: name

          - name: Published
            type: boolean
            default: false

          - name: Description
            type: rich-text
            options:
              switcher: false
              format: html

          - name: Body
            type: rich-text
            required: true
            options:
              format: html

          - name: ReadTime
            type: number
            options:
              min: 1

          - name: ReleaseDate
            type: date
            required: true

          - name: LastUpdated
            type: date

          - name: Pics
            type: image
            list: true

          - name: Files
            type: file
            list: true

          - name: Links
            type: string
            list: true

          - name: Comments
            type: boolean
            default: true
            
          - name: Likes
            type: boolean
            default: true
  # Sharan's Content===============================================================

  - name: SharanContent
    type: group
    items:

          - name: ProjectCategories
            type: collection
            path: _data/Sharan/Projectcategories
            format: json
            filename: "{slug}.json"
            view:
              primary: name
            fields:
              - name: name
                type: string
                required: true

          - name: ProjectStatus
            type: collection
            path: _data/Sharan/ProjectStatus
            format: json
            filename: "{slug}.json"
            view:
              primary: name
            fields:
              - name: name
                type: string
                required: true

          - name: Projects
            path: _data/Sharan/Projects
            type: collection
            format: json
            filename: "{slug}.json"
            view:
              fields: [Title, Status, Category, Published, ReleaseDate, LastUpdated]
              primary: Title
              sort: [ReleaseDate, Title]
              default:
                sort: ReleaseDate
                order: desc
            fields:
              - name: Title
                type: string
                required: true

              - name: Category
                type: reference
                required: true
                options:
                  collection: ProjectCategories
                  field: name

              - name: Status
                type: reference
                required: true
                options:
                  collection: ProjectStatus
                  field: name


              - name: Published
                type: boolean
                default: false


              - name: Description
                type: rich-text
                options:
                  switcher: false
                  format: html

              - name: Body
                type: rich-text
                required: true
                options:
                  switcher: false
                  format: html

              - name: StartedDate
                type: date
                required: true

              - name: LastUpdated
                type: date
                
              - name: Pics
                type: image
                list: true

              - name: Files
                type: file
                list: true

              - name: Links
                type: string
                list: true
                
              - name: Comments
                type: boolean
                default: true

              - name: Likes
                type: boolean
                default: true

          - name: ProjectUpdates
            path: _data/Sharan/ProjectUpdates
            type: collection
            format: json
            filename: "{slug}.json"
          
            view:
              fields: [Title, Project, Published, Status, UpdateDate]
              primary: Title
              sort: [UpdateDate, Title]
              default:
                sort: UpdateDate
                order: desc
          
            fields:
              - name: Project
                type: reference
                required: true
                options:
                  collection: Projects
                  field: Title

              - name: Title
                type: string
                required: true

              - name: Status
                type: reference
                required: true
                options:
                  collection: ProjectStatus
                  field: name

              - name: Published
                type: boolean
                default: false
                
              - name: Description
                type: rich-text
                options:
                  switcher: false
                  format: html

              - name: Body
                type: rich-text
                required: true
                options:
                  switcher: false
                  format: html

              - name: UpdateDate
                type: date
                required: true
                options:
                  time: true
                
              - name: Pics
                type: image
                list: true

              - name: Files
                type: file
                list: true

              - name: Links
                type: string
                list: true


              - name: Comments
                type: boolean
                default: true

              - name: Likes
                type: boolean
                default: true