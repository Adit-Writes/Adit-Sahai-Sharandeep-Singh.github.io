media: files
content:
  - name: Articals
    label: Articals
    path: Data
    type: collection
    
    view:
      fields: [Title, Published, ReleaseDate]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
        
    fields:
      - name: Title
        type: string
        
      - name: Type
        type: select
        
      - name: Published
        type: boolean
        default: false
        
      - name: Description
        type: rich-text
        
      - name: Body
        type: rich-text
        
      - name: ReleaseDate
        type: date
        
      - name: Comments
        type: boolean
        default: true
        
      - name: Likes
        type: boolean
        default: true
        
  