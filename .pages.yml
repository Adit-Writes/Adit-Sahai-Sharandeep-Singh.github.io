media: files
content:
  - name: Articals
    label: Articals
    path: Data
    type: collection
    fields:
      - name: Label
        type: string
        
      - name: Type
        type: select
        
      - name: Description
        type: rich-text
        
      - name: Body
        type: rich-text
        
      - name: ReleaseData
        type: date
        
      - name: Comments
        type: boolean
        default: true
        
      - name: Likes
        type: boolean
        default: true
        
  