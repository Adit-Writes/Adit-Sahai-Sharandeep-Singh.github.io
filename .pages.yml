media: files

content:
  - name: AboutAuthor
    type: file
    path: Data/AboutAuthor
    fields:
      - name: Name
        type: string
        required: true

      - name: Pic
        type: image
        
      - name: Desciption
        type: rich-text
        options:
          switcher: false

  - name: Books
    path: Data/Books
    type: collection
    view:
      fields: [Name, Pic, PublishedDate, Link]
      primary: Name
      sort: [PublishedDate, Name]
      default:
        sort: PublishedDate
        order: desc

    fields:
      - name: Name
        type: string
        required: true
      
      - name: PublishedDate
        type: date
        required: true
        
      - name: Pic
        type: image

      - name: About
        type: rich-text
        options:
          switcher: false

      - name: Link
        type: string

  - name: Articals
    path: Data/Articals
    type: collection
    
    view:
      fields: [Title, Category, Published, ReleaseDate, LastUpdated]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
        
    fields:
      - name: Title
        type: string
        required: true
        
      - name: Category
        type: select
        required: true
        options:
          values: [Science, Space, Politics, Sports]
          placeholder: Select the category of the Artical
        
      - name: Published
        type: boolean
        default: false

      - name: Comments
        type: boolean
        default: true
        
      - name: Likes
        type: boolean
        default: true
        
      - name: Description
        type: rich-text
        options:
          switcher: false
        
      - name: Body
        type: rich-text
        required: true
        options:
          switcher: false
        
      - name: ReleaseDate
        type: date
        required: true
        
      - name: LastUpdated
        type: date
        
  